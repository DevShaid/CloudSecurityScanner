name: Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      aws_profile:
        description: 'AWS Profile to use'
        required: true
        default: 'production'
      region:
        description: 'AWS Region to scan'
        required: true
        default: 'us-east-1'
      workers:
        description: 'Number of parallel workers'
        required: true
        default: '8'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ github.event.inputs.region || 'us-east-1' }}
    
    - name: Run CloudGuard security scan
      run: |
        python cg.py \
          --profile ${{ github.event.inputs.aws_profile || 'production' }} \
          --region ${{ github.event.inputs.region || 'us-east-1' }} \
          --workers ${{ github.event.inputs.workers || '8' }} \
          --json security-report.json \
          --html security-report.html \
          --fail-on-critical
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report-${{ github.run_number }}
        path: |
          security-report.json
          security-report.html
    
    - name: Parse security score
      id: score
      run: |
        SCORE=$(python -c "import json; data=json.load(open('security-report.json')); print(data['score']['score'])")
        GRADE=$(python -c "import json; data=json.load(open('security-report.json')); print(data['score']['grade'])")
        CRITICAL=$(python -c "import json; data=json.load(open('security-report.json')); print(data['score']['counts']['CRITICAL'])")
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
    
    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const score = '${{ steps.score.outputs.score }}';
          const grade = '${{ steps.score.outputs.grade }}';
          const critical = '${{ steps.score.outputs.critical }}';
          
          const comment = `## 🛡️ Security Scan Results
          
          **Security Score:** ${score}/100 (Grade: ${grade})
          **Critical Issues:** ${critical}
          
          ${critical > 0 ? '⚠️ **Critical security issues detected!** Please review the report.' : '✅ **No critical security issues found.**'}
          
          [View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
    
    - name: Send Slack notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#security-alerts'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        custom_payload: |
          {
            "text": "🛡️ CloudGuard Security Scan Complete",
            "attachments": [
              {
                "color": "${{ steps.score.outputs.critical > 0 && 'danger' || 'good' }}",
                "fields": [
                  {
                    "title": "Security Score",
                    "value": "${{ steps.score.outputs.score }}/100 (${{ steps.score.outputs.grade }})",
                    "short": true
                  },
                  {
                    "title": "Critical Issues",
                    "value": "${{ steps.score.outputs.critical }}",
                    "short": true
                  },
                  {
                    "title": "Repository",
                    "value": "${{ github.repository }}",
                    "short": true
                  },
                  {
                    "title": "Region",
                    "value": "${{ github.event.inputs.region || 'us-east-1' }}",
                    "short": true
                  }
                ]
              }
            ]
          }
    
    - name: Send email notification
      if: steps.score.outputs.critical > 0
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚨 Critical Security Issues Detected - ${{ github.repository }}"
        to: ${{ secrets.SECURITY_TEAM_EMAIL }}
        from: CloudGuard Enhanced
        body: |
          Critical security issues have been detected in your AWS infrastructure.
          
          Security Score: ${{ steps.score.outputs.score }}/100 (Grade: ${{ steps.score.outputs.grade }})
          Critical Issues: ${{ steps.score.outputs.critical }}
          
          Please review the security report and take immediate action.
          
          Repository: ${{ github.repository }}
          Workflow: ${{ github.workflow }}
          Run: ${{ github.run_id }}
    
    - name: Create security issue
      if: steps.score.outputs.critical > 0
      uses: actions/github-script@v6
      with:
        script: |
          const critical = '${{ steps.score.outputs.critical }}';
          const score = '${{ steps.score.outputs.score }}';
          const grade = '${{ steps.score.outputs.grade }}';
          
          const title = `🚨 Critical Security Issues Detected (${critical} issues)`;
          const body = `## Security Scan Results
          
          **Security Score:** ${score}/100 (Grade: ${grade})
          **Critical Issues:** ${critical}
          
          ### Next Steps
          1. Review the security report
          2. Address critical issues immediately
          3. Update security policies if needed
          
          ### Report Links
          - [Security Report JSON](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [Security Report HTML](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ### Labels
          - security
          - critical
          - aws
          - cloudguard`;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['security', 'critical', 'aws', 'cloudguard']
          });
